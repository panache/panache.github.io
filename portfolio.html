  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/portfolio.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="assets/images/VF Logo - White@4x.png" alt="VelocityFund"></a>
  <ul>
    <li><a href="portfolio.html" class="active">Portfolio</a></li>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-header-grid"></div>
  <div class="page-header-glow"></div>
  <div class="section-label">Portfolio</div>
  <h1>74 companies.</h1>
  <p>Every company we've backed — from the first $25k scout cheques to rounds we've led.</p>
</div>

<!-- FILTER BAR -->
<div class="filter-section">
  <div class="filter-inner">

    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search companies…" autocomplete="off" spellcheck="false">
    </div>

    <div class="filter-dropdown" id="dd-fund">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-fund')">
        <span class="trigger-label">Fund</span>
        <span class="trigger-value">All</span>
        <span class="chevron"></span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-option active" data-filter="fund" data-val="all">All Funds</button>
        <button class="dropdown-option" data-filter="fund" data-val="Fund I">Fund I</button>
        <button class="dropdown-option" data-filter="fund" data-val="Fund II">Fund II</button>
        <button class="dropdown-option" data-filter="fund" data-val="Rolling / Bridge">Rolling / Bridge</button>
      </div>
    </div>

    <div class="filter-dropdown" id="dd-sector">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-sector')">
        <span class="trigger-label">Sector</span>
        <span class="trigger-value">All</span>
        <span class="chevron"></span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-option active" data-filter="sector" data-val="all">All Sectors</button>
        <button class="dropdown-option" data-filter="sector" data-val="SaaS">SaaS</button>
        <button class="dropdown-option" data-filter="sector" data-val="AI/ML">AI / ML</button>
        <button class="dropdown-option" data-filter="sector" data-val="Health Tech">Health Tech</button>
        <button class="dropdown-option" data-filter="sector" data-val="Deep Tech">Deep Tech</button>
        <button class="dropdown-option" data-filter="sector" data-val="Fintech">Fintech</button>
        <button class="dropdown-option" data-filter="sector" data-val="Climate">Climate</button>
        <button class="dropdown-option" data-filter="sector" data-val="Gaming">Gaming</button>
        <button class="dropdown-option" data-filter="sector" data-val="Consumer">Consumer</button>
      </div>
    </div>

    <div class="filter-dropdown" id="dd-location">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-location')">
        <span class="trigger-label">Location</span>
        <span class="trigger-value">All</span>
        <span class="chevron"></span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-option active" data-filter="location" data-val="all">All Locations</button>
        <button class="dropdown-option" data-filter="location" data-val="Canada">Canada</button>
        <button class="dropdown-option" data-filter="location" data-val="United States">United States</button>
      </div>
    </div>

    <div class="filter-dropdown" id="dd-year">
      <button class="dropdown-trigger" onclick="toggleDropdown('dd-year')">
        <span class="trigger-label">Year</span>
        <span class="trigger-value">All</span>
        <span class="chevron"></span>
      </button>
      <div class="dropdown-menu">
        <button class="dropdown-option active" data-filter="year" data-val="all">All Years</button>
        <button class="dropdown-option" data-filter="year" data-val="2026">2026</button>
        <button class="dropdown-option" data-filter="year" data-val="2025">2025</button>
        <button class="dropdown-option" data-filter="year" data-val="2024">2024</button>
        <button class="dropdown-option" data-filter="year" data-val="2023">2023</button>
        <button class="dropdown-option" data-filter="year" data-val="2022">2022</button>
        <button class="dropdown-option" data-filter="year" data-val="2021">2021</button>
        <button class="dropdown-option" data-filter="year" data-val="2020">2020</button>
        <button class="dropdown-option" data-filter="year" data-val="2019">2019</button>
      </div>
    </div>

  </div>
</div>

<!-- RESULTS META -->
<div class="results-meta">
  <p class="results-count" id="resultsCount">Loading…</p>
</div>

<!-- GRID -->
<div class="portfolio-wrap">
  <div class="portfolio-grid-full" id="portfolioGrid"></div>
</div>

</footer>

<script src="assets/js/portfolio.js"></script>
</body>
</html>
